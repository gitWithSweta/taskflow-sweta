app:
  name: taskflow
  env: production
  log_level: ERROR

server:
  port: 4000
  read_timeout: 15s
  write_timeout: 30s
  idle_timeout: 60s
  shutdown_timeout: 30s

db:
  url: ""
  pool:
    max_conns: 25
    min_conns: 5
    max_conn_lifetime: 1h
    max_conn_lifetime_jitter: 5m
    max_conn_idle_time: 30m
    health_check_period: 1m
    connect_timeout: 10s
    statement_timeout: 30s

auth:
  jwt_secret: ""
  token_ttl: 24h

cors:
  allowed_origins: ""

seed:
  csv_dir: ""
