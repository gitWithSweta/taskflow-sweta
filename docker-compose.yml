name: taskflow

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

networks:
  internal:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    networks:
      - internal
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taskflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env (use a strong value in production)}
      POSTGRES_DB: ${POSTGRES_DB:-taskflow}
      TZ: ${TZ:-UTC}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-taskflow} -d ${POSTGRES_DB:-taskflow}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: taskflow-backend:${IMAGE_TAG:-local}
    restart: unless-stopped
    logging: *default-logging
    networks:
      - internal
    init: true
    stop_grace_period: 35s
    environment:
      APP_ENV: prd
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      DATABASE_URL: ${TASKFLOW_DATABASE_URL:-postgres://${POSTGRES_USER:-taskflow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-taskflow}?sslmode=disable}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env — never commit real secrets}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS to comma-separated browser origins (e.g. https://app.example.com)}
      TZ: ${TZ:-UTC}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:4000/healthz",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: taskflow-web:${IMAGE_TAG:-local}
    restart: unless-stopped
    logging: *default-logging
    networks:
      - internal
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
    name: taskflow_postgres_data
